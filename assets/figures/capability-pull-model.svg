<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Trellis capability pull model: four levels of capability offerings from Community at the bottom to Programs at the top, with arrows showing how demand pulls offerings up the chain — connection, skill, and depth.">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 9 5 L 0 10" fill="none" stroke="#4A6741" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#FAFAF8"/>

  <!-- LAYER 1: PROGRAMS (top) -->
  <rect x="60" y="25" width="780" height="110" rx="6" fill="#F5F1E8" stroke="#A89B7C" stroke-width="1.5"/>
  <text x="90" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="600" letter-spacing="3" fill="#8B7B5F">PROGRAMS</text>
  <text x="90" y="92" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="600" fill="#2A2520">Sustained engagement</text>
  <text x="90" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#6B5D4F">multi-week cohorts where deeper development happens</text>

  <!-- Arrow: Workshops → Programs -->
  <line x1="450" y1="165" x2="450" y2="140" stroke="#4A6741" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#4A6741">depth</text>

  <!-- LAYER 2: WORKSHOPS -->
  <rect x="60" y="170" width="780" height="110" rx="6" fill="#D9CDB4" stroke="#8B7B5F" stroke-width="1.5"/>
  <text x="90" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="600" letter-spacing="3" fill="#5A4A2F">WORKSHOPS</text>
  <text x="90" y="237" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="600" fill="#2A2520">Structured sessions</text>
  <text x="90" y="263" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#5A4A2F">where specific skills and capabilities get practiced</text>

  <!-- Arrow: Meetups → Workshops -->
  <line x1="450" y1="310" x2="450" y2="285" stroke="#4A6741" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="303" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#4A6741">skill</text>

  <!-- LAYER 3: MEETUPS -->
  <rect x="60" y="315" width="780" height="110" rx="6" fill="#A89878" stroke="#5A4A2F" stroke-width="1.5"/>
  <text x="90" y="345" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="600" letter-spacing="3" fill="#3A2F1F">MEETUPS</text>
  <text x="90" y="382" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="600" fill="#2A2520">Voluntary gatherings</text>
  <text x="90" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#3A2F1F">where people share what they are working on</text>

  <!-- Arrow: Community → Meetups -->
  <line x1="450" y1="455" x2="450" y2="430" stroke="#4A6741" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="465" y="448" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic" fill="#4A6741">connection</text>

  <!-- LAYER 4: COMMUNITY (bottom) -->
  <rect x="60" y="460" width="780" height="110" rx="6" fill="#4A4538" stroke="#2A2520" stroke-width="1.5"/>
  <text x="90" y="490" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="600" letter-spacing="3" fill="#C9B89C">COMMUNITY</text>
  <text x="90" y="527" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="600" fill="#F5F1E8">Forums, channels, newsletters</text>
  <text x="90" y="553" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#D4C8B0">where curiosity surfaces and conversations begin</text>
</svg>
